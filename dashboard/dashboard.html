<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GoGreen CMS</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- Figma proof-of-concept prototype export, cleaned for validation purposes. -->
  <nav class="prototype-nav" aria-label="Prototype navigation">
    <a href="../login/login.html">Login</a>
    <a href="../dashboard/dashboard.html">Dashboard</a>
    <a href="../content-editor/content-editor.html">Content Editor</a>
    <a href="../media-library/media-library.html">Media Library</a>
    <a href="../analytics/analytics.html">Analytics</a>
  </nav>

  <main class="prototype-screen">
    <div class="container--0-">
      <svg
        class="top-bar"
        width="1440"
        height="70"
        viewBox="0 0 1440 70"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="1452" height="70" fill="#D9D9D9"></rect></svg
      ><svg
        class="side-bar"
        width="240"
        height="1024"
        viewBox="0 0 240 1024"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="240" height="1024" fill="#D9D9D9"></rect>
      </svg>
      <div class="text-0-1-2">Dashboard</div>
      <div class="text-0-1-3">Content</div>
      <div class="text-0-1-4">Media</div>
      <div class="text-0-1-5">Analytics</div>
      <svg
        class="stat-card stat-card-posts"
        width="451"
        height="218"
        viewBox="0 0 451 218"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="451" height="218" fill="#D9D9D9"></rect></svg
      ><svg
        class="stat-card stat-card-media"
        width="451"
        height="218"
        viewBox="0 0 451 218"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="451" height="218" fill="#D9D9D9"></rect></svg
      ><svg
        class="stat-card stat-card-views"
        width="451"
        height="218"
        viewBox="0 0 451 218"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="451" height="218" fill="#D9D9D9"></rect>
      </svg>
      <div class="text-0-1-9">Total posts</div>
      <div class="text-0-1-10">Media Files</div>
      <div class="text-0-1-11">Views</div>
    </div>
  </main>
</body>
</html>
